# ===================================
# Nginx — обратный прокси для OnionRP Streaming Tool
# ===================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Ограничение размера загрузки (50MB)
    client_max_body_size 50m;

    # Заголовки безопасности
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Апстрим: фронтенд
    upstream web_upstream {
        server web:80;
    }

    # Апстрим: WebRTC-нода (API + WebSocket)
    upstream webrtc_upstream {
        server webrtc-node:3001;
    }

    server {
        listen 80;
        server_name _;

        # Фронтенд SPA
        location / {
            proxy_pass http://web_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API запросы на WebRTC-ноду
        location /api/ {
            proxy_pass http://webrtc_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket подключения (основной канал + /overlay namespace)
        location /socket.io/ {
            proxy_pass http://webrtc_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # 1 hour timeout for persistent WebSocket connections
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
            proxy_buffering off;
        }

        # Медиафайлы (без кэш-зоны — только заголовки)
        location /media/ {
            proxy_pass http://webrtc_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header Cache-Control "public, max-age=3600";
        }
    }
}
