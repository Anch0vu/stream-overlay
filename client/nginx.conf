# Конфигурация nginx для SPA-приложения (внутри контейнера web)
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Все маршруты отдаём через index.html (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэширование статических ресурсов
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
