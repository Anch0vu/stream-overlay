# ===================================
# Конфигурация Coturn TURN сервера
# NAT traversal для WebRTC
# ===================================

# Порт TURN сервера
listening-port=3478

# Внешний IP адрес сервера (замените на реальный)
external-ip=95.165.172.153

# Диапазон портов для relay
min-port=49152
max-port=49200

# Аутентификация пользователей (ЗАПРЕЩЕН анонимный доступ)
lt-cred-mech

# Имя области (realm)
realm=onionrp.ru

# Пользователь: имя:пароль
user=onionrp:your_turn_password_here

# Логирование
log-file=/var/log/turnserver.log
verbose

# Ограничение скорости relay (защита от злоупотреблений)
max-bps=1000000

# Максимум соединений с одного IP
total-quota=100
stale-nonce=600

# Запрет на relay к локальным сетям (защита от SSRF)
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255

# Только UDP relay (минимальная задержка)
no-tcp-relay

# Fingerprint для STUN/TURN
fingerprint

# Не запускать как демон (Docker сам управляет процессом)
no-daemon
