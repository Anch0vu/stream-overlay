# ===================================
# OnionRP Streaming Tool — Docker Compose
# Разделение сервисов на контейнеры
# ===================================

version: '3.8'

services:
  # --- Redis: хранилище временных токенов и ключей ---
  redis:
    image: redis:7-alpine
    container_name: onionrp-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - onionrp-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- WebRTC Node: сигнальный сервер + mediasoup SFU ---
  webrtc-node:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: onionrp-webrtc
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
      - "40000-40100:40000-40100/udp"
    volumes:
      - media-storage:/app/media
    networks:
      - onionrp-net
    depends_on:
      redis:
        condition: service_healthy
    cap_add:
      - SYS_NICE

  # --- Web: фронтенд док-панели ---
  web:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: onionrp-web
    restart: unless-stopped
    networks:
      - onionrp-net
    depends_on:
      - webrtc-node

  # --- Nginx: обратный прокси ---
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: onionrp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - onionrp-net
    depends_on:
      - web
      - webrtc-node

  # --- Coturn: TURN сервер для NAT traversal ---
  coturn:
    image: coturn/coturn:latest
    container_name: onionrp-coturn
    restart: unless-stopped
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49152-49200:49152-49200/udp"
    volumes:
      - ./coturn/turnserver.conf:/etc/turnserver.conf:ro
    networks:
      - onionrp-net

volumes:
  redis-data:
    driver: local
  media-storage:
    driver: local

networks:
  onionrp-net:
    driver: bridge
