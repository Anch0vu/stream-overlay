version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: voidsound
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  nginx-core:
    image: nginx:1.27-alpine
    depends_on:
      - web
    ports:
      - "8081:80"
    volumes:
      - ./infra/nginx/core.conf:/etc/nginx/nginx.conf:ro

  nginx-edge:
    image: nginx:1.27-alpine
    depends_on:
      - nginx-core
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/edge.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres-data:
  redis-data:
