# ===================================
# OnionRP Streaming Tool — Docker Compose
# ===================================

services:
  # --- Redis: хранилище временных токенов и ключей ---
  # Запускается только при REDIS_MODE=docker (профиль docker-redis).
  # Если на VDS уже работает системный Redis — этот контейнер не нужен.
  redis:
    profiles: ["docker-redis"]
    image: redis:7-alpine
    container_name: onionrp-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - onionrp-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- WebRTC Node: сигнальный сервер + mediasoup SFU ---
  webrtc-node:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: onionrp-webrtc
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:3001:3001"
      - "40000-49999:40000-49999/udp"
    volumes:
      - media-storage:/app/media
      - server-logs:/app/logs
    networks:
      - onionrp-net
    # required: false — если redis-профиль не активен (внешний Redis),
    # зависимость игнорируется и контейнер стартует без ожидания.
    depends_on:
      redis:
        condition: service_healthy
        required: false
    # host.docker.internal позволяет контейнеру обращаться к сервисам хоста
    # (используется когда REDIS_HOST=host.docker.internal для внешнего Redis)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    cap_add:
      - SYS_NICE
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # --- Web: фронтенд dok-панели ---
  web:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: onionrp-web
    restart: unless-stopped
    networks:
      - onionrp-net
    depends_on:
      webrtc-node:
        condition: service_healthy

  # --- Nginx: обратный прокси ---
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: onionrp-nginx
    restart: unless-stopped
    ports:
      - "13777:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - onionrp-net
    depends_on:
      - web
      - webrtc-node

  # --- Coturn: TURN сервер для NAT traversal ---
  coturn:
    image: coturn/coturn:latest
    container_name: onionrp-coturn
    restart: unless-stopped
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
    volumes:
      - ./coturn/turnserver.conf:/etc/turnserver.conf:ro
    networks:
      - onionrp-net

volumes:
  redis-data:
    driver: local
  media-storage:
    driver: local
  server-logs:
    driver: local

networks:
  onionrp-net:
    driver: bridge
